name: Build and deploy release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build release artifacts
    if: github.repository == 'AdGuardSoftwareLimited/trusttunnel-endpoint'
    runs-on:
      - ephemeral
      - ephemeral-linux
      - ${{ vars.BUILD_IMAGE_VERSION_CORELIBS_BUILDER }}
      - ephemeral-limit-memory-8192
      - ephemeral-limit-cpu-6
    container:
      image: adguard/core-libs:2.10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Retrieve GPG signing secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          role: gpg-signing
          secrets: |
            secret/data/ci-secrets/gpg-signing gpgSecretKey | GPG_SECRET_KEY ;
            secret/data/ci-secrets/gpg-signing gpgPassword | GPG_PASSWORD

      - name: Detect version
        id: version
        run: |
          VERSION=$(grep '^version = ' endpoint/Cargo.toml | head -1 | sed -e 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: |
          set -e -x

          # Build x86_64 musl
          CC=x86_64-linux-musl-gcc \
          CXX=x86_64-linux-musl-g++ \
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-musl-gcc \
          BINDGEN_EXTRA_CLANG_ARGS="--sysroot=/opt/cross/x86_64-linux-musl" \
          cargo build --release --target x86_64-unknown-linux-musl

          # Build aarch64 musl
          CC=aarch64-linux-musl-gcc \
          CXX=aarch64-linux-musl-g++ \
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc \
          BINDGEN_EXTRA_CLANG_ARGS="--sysroot=/opt/cross/aarch64-linux-musl" \
          cargo build --release --target aarch64-unknown-linux-musl

          # Package: strip, split debug symbols, GPG sign, tar.gz
          scripts/ci/package_release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: artifacts/*.tar.gz

  build-macos:
    name: Build macOS artifacts
    if: github.repository == 'AdGuardSoftwareLimited/trusttunnel-endpoint'
    runs-on:
      - ephemeral
      - ephemeral-mac
      - ${{ vars.BUILD_IMAGE_VERSION_MACOS }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Retrieve GPG signing secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          role: gpg-signing
          secrets: |
            secret/data/ci-secrets/gpg-signing gpgSecretKey | GPG_SECRET_KEY ;
            secret/data/ci-secrets/gpg-signing gpgPassword | GPG_PASSWORD

      - name: Detect version
        id: version
        run: |
          VERSION=$(grep '^version = ' endpoint/Cargo.toml | head -1 | sed -e 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GPG_KEY: devteam@adguard.com
        run: |
          set -e -x

          echo "$GPG_SECRET_KEY" | gpg --import --batch --yes

          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

          mkdir -p artifacts
          NAME="trusttunnel-v${VERSION}-macos-universal"

          lipo -create \
            -output trusttunnel_endpoint \
            target/x86_64-apple-darwin/release/trusttunnel_endpoint \
            target/aarch64-apple-darwin/release/trusttunnel_endpoint

          lipo -create \
            -output setup_wizard \
            target/x86_64-apple-darwin/release/setup_wizard \
            target/aarch64-apple-darwin/release/setup_wizard

          dsymutil trusttunnel_endpoint -o trusttunnel_endpoint.dSYM
          dsymutil setup_wizard -o setup_wizard.dSYM

          strip trusttunnel_endpoint
          strip setup_wizard

          gpg --default-key "${GPG_KEY}" --detach-sig \
              --passphrase "${GPG_PASSWORD}" --pinentry-mode loopback \
              trusttunnel_endpoint
          gpg --default-key "${GPG_KEY}" --detach-sig \
              --passphrase "${GPG_PASSWORD}" --pinentry-mode loopback \
              setup_wizard

          cp LICENSE .
          tar zcf "${NAME}.tar.gz" -s ",^,${NAME}/," \
            trusttunnel_endpoint trusttunnel_endpoint.sig \
            setup_wizard setup_wizard.sig LICENSE
          mv "${NAME}.tar.gz" artifacts/

          NAME_DBG="${NAME}-dbgsym"
          tar zcf "${NAME_DBG}.tar.gz" -s ",^,${NAME_DBG}/," \
            trusttunnel_endpoint.dSYM setup_wizard.dSYM
          mv "${NAME_DBG}.tar.gz" artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: artifacts/trusttunnel-*.tar.gz

  deploy:
    name: Deploy release
    needs: [build, build-macos]
    if: github.repository == 'AdGuardSoftwareLimited/trusttunnel-endpoint'
    environment: release-github
    runs-on: [team-corelibs]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version
        id: version
        run: |
          VERSION=$(grep '^version = ' endpoint/Cargo.toml | head -1 | sed -e 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_GPR_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e -x
          TAG=v${VERSION}
          CHANGELOG_URL="https://github.com/TrustTunnel/TrustTunnel/blob/${TAG}/CHANGELOG.md"

          gh release delete -y ${TAG} -R TrustTunnel/TrustTunnel || true
          gh release create ${TAG} \
            -R TrustTunnel/TrustTunnel \
            -t "${TAG}" \
            -n "See [CHANGELOG.md](${CHANGELOG_URL}) for the list of changes."

          for f in artifacts/*.tar.gz; do
            gh release upload ${TAG} "$f" -R TrustTunnel/TrustTunnel
          done
